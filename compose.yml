services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: rag_db
    depends_on:
      rag_db:
        condition: service_healthy
    networks:
      - app-network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "echo", "ruok"]
      interval: 5s
      timeout: 2s
      retries: 3

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "29092:29092"
      - "9092:9092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - app-network

  rag_db:
    image: pgvector/pgvector:pg13 
    container_name: rag_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: $POSTGRES_DB
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka_ui:
    image: provectuslabs/kafka-ui:latest
    container_name: rag_kafka_ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092 
    networks:
      - app-network

  minio:
    image: quay.io/minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env
    networks:
      - app-network
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: $MINIO_ROOT_USER
      MINIO_ROOT_PASSWORD: $MINIO_ROOT_PASSWORD
    command: server /data --console-address ":9001"
    restart: unless-stopped

  worker_chunker:
    build:
      context: .                          
      dockerfile: Dockerfile.chunker_worker
    container_name: rag_worker_chunker
    environment:
       - KAFKA_BOOTSTRAP_SERVERS=kafka:9092  
    env_file:
      - .env
    depends_on:
      - rag_db
      - kafka
    restart: always
    networks:
    - app-network

  worker_chunk_summarizer:
    build:
      context: .                          
      dockerfile: Dockerfile.chunk_summarizer_worker
    container_name: rag_chunk_summarizer
    environment:
       - KAFKA_BOOTSTRAP_SERVERS=kafka:9092  
    env_file:
      - .env
    depends_on:
      - rag_db
      - kafka
    restart: always
    networks:
    - app-network

  worker_full_summarizer:
    build:
      context: .                          
      dockerfile: Dockerfile.full_summarizer_worker
    container_name: rag_full_summarizer
    environment:
       - KAFKA_BOOTSTRAP_SERVERS=kafka:9092  
    env_file:
      - .env
    depends_on:
      - rag_db
      - kafka
    restart: always
    networks:
    - app-network

  redis:
    image: redis:7-alpine
    container_name: rag_redis
    restart: always
    ports:
      - "7379:6379"
    command: >
      redis-server 
      --appendonly yes 
      --appendfsync everysec 
      --auto-aof-rewrite-percentage 100 
      --auto-aof-rewrite-min-size 64mb
      --save 900 1 
      --save 300 10
      --maxmemory 512mb 
      --maxmemory-policy allkeys-lru
    networks:
      - app-network
    volumes:
      - rag_redis_data:/data






volumes:
  minio_data:
  pgdata:      
  kafka_data:
  rag_redis_data:


networks:
  app-network:
    driver: bridge